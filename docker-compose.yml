# ── Database Mode (Multi-Backend with Web UI) ─────────────────────────────────
services:
  webdav:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/webdav.db
      - JWT_SECRET=your-jwt-secret-change-in-production
    volumes:
      - webdav-data:/app/data
    restart: unless-stopped

volumes:
  webdav-data:

